<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
</head>
<body>
  <div id="lists">
    <label for="newList">Create New List</label>
    <input type="text" name="newList" id="newList"/>
    <button id="createListBtn">Create</button>
  </div>

  <div id="tasks">
    <label for="newTask">Need To Do?</label>
    <input type="text" name="newTask" id="newTask"/>
    <button id="addTaskBtn">Add</button>
  </div>

</body>
</html>
